name: Validate marketplace package

on:
  push:
  pull_request:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate manifests and skill metadata
        run: node scripts/validate-package.mjs
      - name: Check the hosted skill mirror
        run: bash scripts/check-skill-sync.sh
